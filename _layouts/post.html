---
layout: default
---

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p><small>{{ page.date | date_to_string }}</small></p>
  </header>

  {{ content }}

  <footer class="post-footer">
    <hr>
    <p>Contact:</p>
    <ul class="contact-links">
      <li><a rel="me" href="https://mastodon.social/@yourhandle">Mastodon</a></li>
      <li><a href="mailto:you@example.com">Email</a></li>
    </ul>
  </footer>
</article>
