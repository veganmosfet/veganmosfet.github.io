<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>

  <!-- Shared Header -->
  <header class="site-header">
    <div class="header-left">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <div class="header-right">
      <a href="https://github.com/veganmosfet" class="github-logo" aria-label="GitHub">
        <img src="{{ '/assets/github-mark.svg' | relative_url }}" alt="GitHub logo">
      </a>
    </div>
  </header>

  <!-- Page/post content -->
  <main>
    {{ content }}
  </main>

  <!-- Shared Footer -->
  <footer class="site-footer">
    <hr>
    <p>Contact:</p>
    <ul class="contact-links">
      <li><a rel="me" href="https://mastodon.social/@yveganmosfet">Mastodon</a></li>
      <li><a href="mailto:veganmosfet@mailbox.org">Email</a></li>
    </ul>
  </footer>

</body>
</html>
